name: medtrack-observability

services:
  backend:
    build:
      context: ./backend
    container_name: medtrack-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_FORMAT: json
      LOG_LEVEL: info
      SERVICE_NAME: medtrack-backend
      SERVICE_VERSION: 1.0.0
      DATABASE_URL: postgresql://medtrack:medtrack@postgres:5432/medicine_db
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    labels:
      logging.grafana.com/scrape: "true"
      logging.grafana.com/service: medtrack-backend
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - observability

  db-migrate:
    build:
      context: ./backend
      target: migration
    container_name: medtrack-db-migrate
    environment:
      DATABASE_URL: postgresql://medtrack:medtrack@postgres:5432/medicine_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - observability

  postgres:
    image: postgres:17-alpine
    container_name: medtrack-postgres
    environment:
      POSTGRES_DB: medicine_db
      POSTGRES_USER: medtrack
      POSTGRES_PASSWORD: medtrack
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medtrack -d medicine_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability

  redis:
    image: redis:7.4-alpine
    container_name: medtrack-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability

  loki:
    image: grafana/loki:3.7.0
    container_name: medtrack-loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - observability

  grafana:
    image: grafana/grafana:12.2.0
    container_name: medtrack-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - observability

  alloy:
    image: grafana/alloy:v1.17.0
    container_name: medtrack-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - observability

networks:
  observability:
    name: medtrack-observability

volumes:
  loki-data:
  grafana-data:
  alloy-data:
  postgres-data:
  redis-data:
