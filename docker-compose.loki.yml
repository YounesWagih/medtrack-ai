name: medtrack-observability

services:
  backend:
    build:
      context: ./backend
    container_name: medtrack-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_FORMAT: json
      LOG_LEVEL: info
      SERVICE_NAME: medtrack-backend
      SERVICE_VERSION: 1.0.0
      METRICS_ENABLED: "true"
      METRICS_PORT: 9464
      TRACING_ENABLED: "true"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
      OTEL_TRACES_SAMPLER_RATIO: 1
      DATABASE_URL: postgresql://medtrack:medtrack@postgres:5432/medicine_db
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    expose:
      - "9464"
    labels:
      logging.grafana.com/scrape: "true"
      logging.grafana.com/service: medtrack-backend
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      loki:
        condition: service_healthy
      alloy:
        condition: service_started
    networks:
      - observability

  db-migrate:
    build:
      context: ./backend
      target: migration
    container_name: medtrack-db-migrate
    environment:
      DATABASE_URL: postgresql://medtrack:medtrack@postgres:5432/medicine_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - observability

  postgres:
    image: postgres:17-alpine
    container_name: medtrack-postgres
    environment:
      POSTGRES_DB: medicine_db
      POSTGRES_USER: medtrack
      POSTGRES_PASSWORD: medtrack
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medtrack -d medicine_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability

  redis:
    image: redis:7.4-alpine
    container_name: medtrack-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    container_name: medtrack-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://medtrack:medtrack@postgres:5432/medicine_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - observability

  redis-exporter:
    image: oliver006/redis_exporter:v1.75.0
    container_name: medtrack-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - observability

  fake-telemetry:
    build:
      context: ./observability/fake-telemetry
    container_name: medtrack-fake-telemetry
    profiles: ["fake-telemetry"]
    environment:
      FAKE_TELEMETRY_SCENARIO: ${FAKE_TELEMETRY_SCENARIO:-normal}
      FAKE_TELEMETRY_LOGS_PER_SECOND: ${FAKE_TELEMETRY_LOGS_PER_SECOND:-2}
      FAKE_TELEMETRY_METRICS_PORT: ${FAKE_TELEMETRY_METRICS_PORT:-9465}
      FAKE_TELEMETRY_SERVICE_NAME: ${FAKE_TELEMETRY_SERVICE_NAME:-medtrack-backend}
      FAKE_TELEMETRY_ENVIRONMENT: ${FAKE_TELEMETRY_ENVIRONMENT:-production}
      FAKE_TELEMETRY_VERSION: ${FAKE_TELEMETRY_VERSION:-1.0.0}
      FAKE_TELEMETRY_TRACES_ENABLED: ${FAKE_TELEMETRY_TRACES_ENABLED:-true}
      FAKE_TELEMETRY_OTLP_TRACES_ENDPOINT: ${FAKE_TELEMETRY_OTLP_TRACES_ENDPOINT:-http://alloy:4318/v1/traces}
    expose:
      - "9465"
    labels:
      logging.grafana.com/scrape: "true"
      logging.grafana.com/service: medtrack-backend
    depends_on:
      alloy:
        condition: service_started
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: medtrack-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - backend
      - postgres-exporter
      - redis-exporter
    networks:
      - observability

  loki:
    image: grafana/loki:3.7.0
    container_name: medtrack-loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.10.7
    container_name: medtrack-tempo
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - observability

  grafana:
    image: grafana/grafana:12.2.0
    container_name: medtrack-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_started
      prometheus:
        condition: service_healthy
    networks:
      - observability

  alloy:
    image: grafana/alloy:v1.17.0
    container_name: medtrack-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - observability

networks:
  observability:
    name: medtrack-observability

volumes:
  loki-data:
  grafana-data:
  alloy-data:
  postgres-data:
  redis-data:
  prometheus-data:
  tempo-data:
